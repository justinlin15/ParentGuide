name: Event Pipeline

on:
  # Run twice daily at non-round times
  schedule:
    - cron: "17 5,18 * * *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no CloudKit upload)"
        required: false
        default: "false"
        type: boolean
      scrapers_only:
        description: "Run scrapers only (skip APIs)"
        required: false
        default: "false"
        type: boolean

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci

      - name: Install Playwright (for scrapers)
        working-directory: pipeline
        run: npx playwright install --with-deps chromium

      - name: Run pipeline
        working-directory: pipeline
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLOUDKIT_CONTAINER: ${{ secrets.CLOUDKIT_CONTAINER }}
          CLOUDKIT_KEY_ID: ${{ secrets.CLOUDKIT_KEY_ID }}
          CLOUDKIT_PRIVATE_KEY: ${{ secrets.CLOUDKIT_PRIVATE_KEY }}
          CLOUDKIT_ENVIRONMENT: ${{ secrets.CLOUDKIT_ENVIRONMENT }}
          OC_PARENT_GUIDE_EMAIL: ${{ secrets.OC_PARENT_GUIDE_EMAIL }}
          OC_PARENT_GUIDE_PASSWORD: ${{ secrets.OC_PARENT_GUIDE_PASSWORD }}
        run: |
          # Random jitter only for scheduled runs (not manual triggers)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            JITTER=$((RANDOM % 300))
            echo "Scheduled run — sleeping ${JITTER}s jitter"
            sleep $JITTER
          fi
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.scrapers_only }}" = "true" ]; then
            ARGS="$ARGS --scrapers-only"
          fi
          npx tsx src/index.ts $ARGS

      - name: Check for empty output (staleness protection)
        if: success()
        working-directory: pipeline
        run: |
          if [ ! -f output/all-events.json ]; then
            echo "::error::Pipeline output file not found: output/all-events.json"
            exit 1
          fi
          EVENT_COUNT=$(jq 'length' output/all-events.json)
          echo "Event count: $EVENT_COUNT"
          if [ "$EVENT_COUNT" -eq 0 ]; then
            echo "::error::Pipeline produced 0 events. Failing to prevent pushing empty data."
            exit 1
          fi
          echo "Staleness check passed: $EVENT_COUNT events found."

      - name: Output job summary
        if: success()
        working-directory: pipeline
        run: |
          if [ -f output/summary.json ]; then
            echo "## Event Pipeline Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            jq -r 'to_entries[] | "| \(.key) | \(.value) |"' output/summary.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Run #${{ github.run_number }} at $(date -u '+%Y-%m-%d %H:%M UTC')_" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::summary.json not found, skipping job summary."
          fi

      - name: Commit events JSON to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp pipeline/output/all-events.json docs/api/events.json 2>/dev/null || {
            mkdir -p docs/api
            cp pipeline/output/all-events.json docs/api/events.json
          }
          git add docs/api/events.json
          git diff --cached --quiet || (git commit -m "Update events data [pipeline]" && git pull --rebase origin main && git push)

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: pipeline/output/
          retention-days: 7

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Event Pipeline failed (run #${{ github.run_number }})" \
            --body "The Event Pipeline workflow failed on $(date -u '+%Y-%m-%d %H:%M UTC').

          **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Branch:** \`${{ github.ref_name }}\`
          **Trigger:** \`${{ github.event_name }}\`

          Please investigate the logs for details." \
            --label "bug"
