name: Fill Missing Images

on:
  workflow_dispatch:

jobs:
  fill-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci

      - name: Download last pipeline output
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: pipeline
        run: |
          mkdir -p output
          # Get the latest successful pipeline run artifact
          RUN_ID=$(gh run list --workflow=pipeline.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "No successful pipeline run found"
            exit 1
          fi
          echo "Downloading artifacts from run $RUN_ID..."
          # Find the artifact name (it includes the run number)
          ARTIFACT_NAME=$(gh api "repos/:owner/:repo/actions/runs/${RUN_ID}/artifacts" --jq '.artifacts[0].name')
          echo "Artifact: $ARTIFACT_NAME"
          gh run download "$RUN_ID" -n "$ARTIFACT_NAME" -D output
          if [ ! -f output/all-events.json ]; then
            echo "Could not find all-events.json"
            ls -R output/
            exit 1
          fi
          echo "Events loaded: $(jq length output/all-events.json) total"
          echo "Missing images: $(jq '[.[] | select(.imageURL == "" or .imageURL == null)] | length' output/all-events.json)"

      - name: Fill missing images via Pexels
        working-directory: pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLOUDKIT_CONTAINER: ${{ secrets.CLOUDKIT_CONTAINER }}
          CLOUDKIT_KEY_ID: ${{ secrets.CLOUDKIT_KEY_ID }}
          CLOUDKIT_PRIVATE_KEY: ${{ secrets.CLOUDKIT_PRIVATE_KEY }}
          CLOUDKIT_ENVIRONMENT: ${{ secrets.CLOUDKIT_ENVIRONMENT }}
        run: npx tsx src/fill-images-only.ts

      - name: Upload updated output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fill-images-output-${{ github.run_number }}
          path: pipeline/output/
          retention-days: 7
